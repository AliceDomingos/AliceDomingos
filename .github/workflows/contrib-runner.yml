  name: City Contribution Animation

  on:
    schedule:
      - cron: "0 3 * * *"
    workflow_dispatch:

  jobs:
    generate:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: WendellOttoni/github-contrib-runner@main
          with:
            username: ${{ github.repository_owner }}
            variant: city
            theme: neon
            output: dist/contrib-runner.svg
